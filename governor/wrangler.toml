name = "swayambhu-governor"
main = "worker.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "KV"
id = "05720444f9654ed4985fb67af4aea24d"

# Cron — crash watchdog + pending deploy check (every minute)
[triggers]
crons = ["* * * * *"]

# Secrets (set via: wrangler secret put <NAME>)
# CF_API_TOKEN — Cloudflare API token with Workers Scripts Write permission
# CF_ACCOUNT_ID — Cloudflare account ID
# CF_SCRIPT_NAME — (optional) runtime worker script name, defaults to "swayambhu-cns"

services:
  inference:
    build: .
    restart: unless-stopped
    ports:
      - "8090:8000"
    environment:
      - AUTH_TOKEN=test-secret
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - TOKENIZERS_PARALLELISM=false
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5); sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 3g

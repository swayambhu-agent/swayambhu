              : first.surprise_score !== undefined ? 'experience'
              : 'principle';
            setSelected({ type, key: first.key });
          }
        }
      }, [data, selected]);

      if (loading) return <div className="p-8 text-gray-500">Loading cognitive state...</div>;
      if (error) return <div className="p-8 text-red-400">Error: {error}</div>;
      if (!data) return <div className="p-8 text-gray-500">No data</div>;

      return (
        <div className="flex flex-col h-full">
          <MindHealthBar health={data.operator_health} counts={{
            samskaras: data.samskaras.length,
            desires: data.desires.length,
            experiences: data.experiences.length,
          }} onRefresh={loadData} />
          <MindGraphExplorer data={data} selected={selected} onSelect={setSelected} />
        </div>
      );
    }

    function MindHealthBar({ health, counts, onRefresh }) {
      const bootstrap = health?.bootstrap_complete;
      const sincedr = health?.sessions_since_dr ?? '?';
      const nextdr = health?.next_dr_due;
      const currentSession = (health?.last_deep_reflect_session || 0) + sincedr;
      const sessionsUntilDr = nextdr ? Math.max(0, nextdr - currentSession) : '?';

      return (
        <div className="px-4 py-2 bg-bg-panel border-b border-border flex gap-5 flex-wrap items-center text-xs">
          <div className="flex items-center gap-1.5">
            <span style={{
              width: 7, height: 7, borderRadius: '50%', display: 'inline-block',
              background: bootstrap ? '#22c55e' : '#f59e0b',
            }} />
            <span className="text-gray-500">Bootstrap:</span>
            <span className="text-gray-200">{bootstrap ? 'Complete' : 'Pending'}</span>
          </div>

          <div className="text-gray-500">
            Last DR: <span className="text-purple-400 font-semibold">{sincedr} sessions ago</span>
          </div>

          <div className="text-gray-500">
            Next DR: <span className="text-gray-200">~{sessionsUntilDr} sessions</span>
          </div>

          {health?.last_reflect_output && (
            <div className="text-gray-500">
              DR output: <span className="text-green-400">
                {health.last_reflect_output.has_kv_operations ? 'wrote KV' : 'observations only'}
              </span>
            </div>
          )}

          <div className="flex items-center gap-3 ml-auto text-gray-500">
            <span><span className="text-green-400">●</span> {counts.samskaras} samskaras</span>
            <span><span className="text-purple-400">●</span> {counts.desires} desires</span>
            <span><span className="text-cyan-400">●</span> {counts.experiences} experiences</span>
            {onRefresh && (
              <button onClick={onRefresh} className="text-gray-600 hover:text-gray-400 transition ml-2 text-sm" title="Refresh">
                ↻
              </button>
            )}
          </div>
        </div>
      );
    }

    function MindGraphExplorer({ data, selected, onSelect }) {
      const { principles = [], samskaras = [], desires = [], experiences = [] } = data;

      // Build connection map for the selected entity
      const connections = useMemo(() => {
        if (!selected) return { upstream: [], downstream: [] };
        const { type, key } = selected;
        const upstream = [];
        const downstream = [];

        if (type === 'principle') {
          const pNum = key.replace('principle:', '');
          desires.forEach(d => {
            const sources = d.source_principles || [];
            if (sources.some(s => s === pNum || s === `p${pNum}` || s === key)) {
              downstream.push({ ...d, _type: 'desire' });
            }
          });
        }
        if (type === 'desire') {
          const d = desires.find(d => d.key === key);
          if (d?.source_principles) {
            d.source_principles.forEach(pRef => {
              const p = principles.find(p =>
                p.key === pRef || p.key === `principle:${pRef}` || p.key.endsWith(`:${pRef}`)
              );
              if (p) upstream.push({ ...p, _type: 'principle' });
            });
          }
          experiences.slice(0, 5).forEach(e => upstream.push({ ...e, _type: 'experience' }));
        }
        if (type === 'samskara') {
          experiences.slice(0, 5).forEach(e => upstream.push({ ...e, _type: 'experience' }));
        }
        if (type === 'experience') {
          samskaras.forEach(s => downstream.push({ ...s, _type: 'samskara' }));
          desires.forEach(d => downstream.push({ ...d, _type: 'desire' }));
        }
        return { upstream, downstream };
      }, [selected, principles, samskaras, desires, experiences]);

      const centerEntity = useMemo(() => {
        if (!selected) return null;
        const { type, key } = selected;
        if (type === 'principle') return principles.find(p => p.key === key);
        if (type === 'desire') return desires.find(d => d.key === key);
        if (type === 'samskara') return samskaras.find(s => s.key === key);
        if (type === 'experience') return experiences.find(e => e.key === key);
        return null;
      }, [selected, principles, samskaras, desires, experiences]);

      const typeColor = (t) => ({ principle: '#f59e0b', desire: '#a78bfa', samskara: '#22c55e', experience: '#06b6d4' }[t] || '#666');
      const strengthColor = (s) => s > 0.7 ? '#22c55e' : s > 0.3 ? '#f59e0b' : '#ef4444';
      const trunc = (t, n) => t && t.length > n ? t.slice(0, n - 1) + '\u2026' : (t || '');

      const renderSidebarItem = (entity, type) => {
        const isActive = selected?.type === type && selected?.key === entity.key;
        const col = typeColor(type);
        return (
          <div
            key={entity.key}
            onClick={() => onSelect({ type, key: entity.key })}
            className="cursor-pointer rounded px-1.5 py-1 mb-0.5 text-xs transition"
            style={{
              background: isActive ? `${col}22` : 'transparent',
              border: isActive ? `1px solid ${col}44` : '1px solid transparent',
              color: isActive ? '#e5e5e5' : '#888',
            }}
          >
            {type === 'principle' && trunc(typeof entity.text === 'string' ? entity.text : entity.key, 28)}
            {type === 'desire' && (
              <span>
                <span style={{ color: entity.direction === 'avoidance' ? '#ef4444' : '#22c55e' }}>
                  {entity.direction === 'avoidance' ? '\u2193' : '\u2191'}
                </span>{' '}{trunc(entity.description || entity.slug, 24)}
              </span>
            )}
            {type === 'samskara' && (
              <span style={{ display: 'flex', justifyContent: 'space-between' }}>
                <span>{trunc(entity.pattern, 22)}</span>
                <span style={{ color: strengthColor(entity.strength), fontSize: 10 }}>{entity.strength?.toFixed(2)}</span>
              </span>
            )}
            {type === 'experience' && (
              <span>
                <span style={{ color: '#06b6d4', fontSize: 10 }}>{'\u03c3'}{entity.surprise_score?.toFixed(1)}</span>{' '}
                {trunc(entity.narrative || entity.action_taken, 20)}
              </span>
            )}
          </div>
        );
      };

      const renderConnectedNode = (entity, type) => {
        const col = typeColor(type);
        return (
          <div
            key={entity.key}
            onClick={() => onSelect({ type, key: entity.key })}
            className="cursor-pointer rounded-md mb-2 transition hover:brightness-125"
            style={{ padding: '8px 10px', background: `${col}0d`, border: `1px solid ${col}30`, maxWidth: 210 }}
          >
            <div style={{ fontSize: 9, color: col, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 2 }}>{type}</div>
            {type === 'principle' && <div style={{ fontSize: 12, color: '#e5e5e5', lineHeight: 1.4 }}>{trunc(typeof entity.text === 'string' ? entity.text : '', 50)}</div>}
            {type === 'desire' && (
              <div style={{ fontSize: 12, color: '#e5e5e5' }}>
                <span style={{ color: entity.direction === 'avoidance' ? '#ef4444' : '#22c55e' }}>
                  {entity.direction === 'avoidance' ? '\u2193' : '\u2191'}
                </span>{' '}{trunc(entity.description || entity.slug, 35)}
              </div>
            )}
            {type === 'samskara' && (
              <>
                <div style={{ fontSize: 12, color: '#e5e5e5' }}>{trunc(entity.pattern, 35)}</div>
                <div style={{ fontSize: 10, color: strengthColor(entity.strength), marginTop: 2 }}>
                  strength: {entity.strength?.toFixed(2)}
                </div>
              </>
            )}
            {type === 'experience' && (
              <>
                <div style={{ fontSize: 11, color: '#06b6d4' }}>{'\u03c3'}={entity.surprise_score?.toFixed(2)}</div>
                <div style={{ fontSize: 12, color: '#d4d4d4', marginTop: 2 }}>{trunc(entity.narrative || entity.action_taken, 40)}</div>
              </>
            )}
          </div>
        );
      };

      const renderCenterNode = () => {
        if (!selected || !centerEntity) return null;
        const col = typeColor(selected.type);
        return (
          <div className="rounded-lg p-4" style={{ background: `${col}18`, border: `2px solid ${col}`, maxWidth: 300 }}>
            <div style={{ fontSize: 10, color: col, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>{selected.type}</div>
            {selected.type === 'principle' && (
              <div style={{ fontSize: 14, color: '#e5e5e5', lineHeight: 1.6 }}>{typeof centerEntity.text === 'string' ? centerEntity.text : JSON.stringify(centerEntity.text)}</div>
            )}
            {selected.type === 'desire' && (
              <>
                <div style={{ fontSize: 14, color: '#e5e5e5', lineHeight: 1.5 }}>
                  <span style={{ color: centerEntity.direction === 'avoidance' ? '#ef4444' : '#22c55e', fontSize: 18 }}>
                    {centerEntity.direction === 'avoidance' ? '\u2193' : '\u2191'}
                  </span>{' '}
                  {centerEntity.description || centerEntity.slug}
                </div>
                <div className="text-xs text-gray-500 mt-2">
                  {centerEntity.direction} {'\u00b7'} {centerEntity.source_principles?.join(', ')}
                </div>
              </>
            )}
            {selected.type === 'samskara' && (
              <>
                <div style={{ fontSize: 14, color: '#e5e5e5', lineHeight: 1.5 }}>{centerEntity.pattern}</div>
                <div style={{ marginTop: 8 }}>
                  <div style={{ height: 6, background: 'rgba(255,255,255,0.08)', borderRadius: 3 }}>
                    <div style={{ width: `${(centerEntity.strength || 0) * 100}%`, height: '100%', background: strengthColor(centerEntity.strength), borderRadius: 3 }} />
                  </div>
                  <div style={{ fontSize: 20, fontWeight: 'bold', color: strengthColor(centerEntity.strength), marginTop: 4, fontFamily: 'monospace' }}>
                    {centerEntity.strength?.toFixed(2)}
                  </div>
                </div>
              </>
            )}
            {selected.type === 'experience' && (
              <>
                <div className="text-xs mb-2">
                  <span style={{ color: '#06b6d4' }}>{'\u03c3'}={centerEntity.surprise_score?.toFixed(2)}</span>
                  <span className="text-gray-600 mx-1">{'\u00b7'}</span>
                  <span style={{ color: '#f59e0b' }}>salience={centerEntity.salience?.toFixed(2)}</span>
                </div>
                {centerEntity.action_taken && <div className="text-xs text-gray-400 mb-1">Action: {centerEntity.action_taken}</div>}
                <div style={{ fontSize: 13, color: '#d4d4d4', lineHeight: 1.5 }}>{centerEntity.narrative || centerEntity.outcome}</div>
                {centerEntity.timestamp && <div className="text-xs text-gray-600 mt-2">{new Date(centerEntity.timestamp).toLocaleString()}</div>}
              </>
            )}
          </div>
        );
      };

      return (
        <div className="flex flex-1 overflow-hidden">
          {/* Sidebar */}
          <div className="overflow-y-auto flex-shrink-0 border-r border-border" style={{ width: 200 }}>
            {[
              { label: 'Principles', type: 'principle', items: principles, color: '#f59e0b' },
              { label: 'Desires', type: 'desire', items: desires, color: '#a78bfa' },
              { label: 'Samskaras', type: 'samskara', items: samskaras, color: '#22c55e' },
              { label: 'Experiences', type: 'experience', items: experiences, color: '#06b6d4' },
            ].map(({ label, type, items, color }) => (
              <div key={type} className="border-b border-border" style={{ padding: '8px 10px' }}>
                <div style={{ fontSize: 10, color, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 4 }}>
                  {label} ({items.length})
                </div>
                {items.slice(0, 10).map(entity => renderSidebarItem(entity, type))}
                {items.length > 10 && <div className="text-xs text-gray-600 px-1.5 py-1">+{items.length - 10} more</div>}
              </div>
            ))}
          </div>

          {/* Graph area */}
          <div className="flex-1 flex flex-col overflow-hidden">
            {!selected ? (
              <div className="flex-1 flex items-center justify-center text-gray-600 text-sm">
                Select an entity from the sidebar to explore its connections
              </div>
            ) : (
              <>
                <div className="flex-1 flex items-stretch overflow-auto p-4 gap-2">
                  {/* Upstream column */}
                  <div className="flex flex-col justify-center" style={{ minWidth: 180, maxWidth: 220 }}>
                    {connections.upstream.length > 0 ? (
                      <>
                        <div style={{ fontSize: 9, color: '#666', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6, textAlign: 'center' }}>upstream</div>
                        {connections.upstream.map(e => renderConnectedNode(e, e._type))}
                      </>
                    ) : (
                      <div className="text-xs text-gray-700 text-center italic">
                        {selected.type === 'principle' ? 'immutable root' : 'no upstream found'}
                      </div>
                    )}
                  </div>

                  {/* Left connector */}
                  <div className="flex items-center" style={{ width: 30, flexShrink: 0 }}>
                    {connections.upstream.length > 0 && (
                      <div style={{ width: '100%', height: 1, borderTop: '1px dashed #444' }} />
                    )}
                  </div>

                  {/* Center */}
                  <div className="flex flex-col justify-center items-center" style={{ minWidth: 240 }}>
                    {renderCenterNode()}
                  </div>

                  {/* Right connector */}
                  <div className="flex items-center" style={{ width: 30, flexShrink: 0 }}>
                    {connections.downstream.length > 0 && (
                      <div style={{ width: '100%', height: 1, borderTop: '1px dashed #444' }} />
                    )}
                  </div>

                  {/* Downstream column */}
                  <div className="flex flex-col justify-center" style={{ minWidth: 180, maxWidth: 220 }}>
                    {connections.downstream.length > 0 ? (
                      <>
                        <div style={{ fontSize: 9, color: '#666', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6, textAlign: 'center' }}>downstream</div>
                        {connections.downstream.map(e => renderConnectedNode(e, e._type))}
                      </>
                    ) : (
                      <div className="text-xs text-gray-700 text-center italic">no downstream found</div>
                    )}
                  </div>
                </div>

                {/* Detail strip */}
                <div className="border-t border-border px-4 py-2 flex gap-6 items-center text-xs" style={{ background: 'rgba(255,255,255,0.02)' }}>
                  <div>
                    <span style={{ color: typeColor(selected.type) }}>{selected.type}</span>
                    <span className="text-gray-600 ml-2 font-mono">{selected.key}</span>
                  </div>
                  <div className="ml-auto text-gray-500">
                    {connections.upstream.length > 0 && <span className="mr-4">{'\u2190'} {connections.upstream.length} upstream</span>}
                    {connections.downstream.length > 0 && <span>{connections.downstream.length} downstream {'\u2192'}</span>}
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────
    function App() {
      const [patronKey, setPatronKey] = useState(() => sessionStorage.getItem('patronKey'));
      const [health, setHealth] = useState(null);
      const [mindCounts, setMindCounts] = useState(null);
      const [balances, setBalances] = useState(null);
      const [countdown, setCountdown] = useState(null);
      const [activeTab, setActiveTab] = useState('timeline');
      const [selectedEntry, setSelectedEntry] = useState(null);
      const [leftPct, setLeftPct] = useState(50); // percentage for left panel
      const containerRef = useRef(null);
      const handleDividerDrag = useCallback((clientX) => {
        if (!containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        const pct = Math.max(20, Math.min(80, ((clientX - rect.left) / rect.width) * 100));
        setLeftPct(pct);
      }, []);

      const handleLogin = (key) => {
        sessionStorage.setItem('patronKey', key);
        setPatronKey(key);
      };

      const handleLogout = () => {
        sessionStorage.removeItem('patronKey');
        setPatronKey(null);
        setHealth(null);
        setBalances(null);
      };

      // Load health + balances on auth, poll every 10s
      const loadHealth = useCallback(async () => {
        if (!patronKey) return;
        try {
          const h = await api('/health', patronKey);
          setHealth(h);
          const tryLoadBalances = async (sid) => {
            if (!sid) return false;
            try {
              const k = await api(`/kv/karma:${sid}`, patronKey);
              const entries = k.value || [];
              const end = [...entries].reverse().find(e => (e.event === 'act_complete' || e.event === 'reflect_complete') && e.balances);
              if (end?.balances) { setBalances(end.balances); return true; }
              const start = entries.find(e => e.event === 'act_start' && e.balances);
              if (start?.balances) { setBalances(start.balances); return true; }
            } catch {}
            return false;
          };
          if (!(await tryLoadBalances(h.session))) {
            try {
              const d = await api('/kv/cache:session_ids', patronKey);
              const ids = d.value || [];
              if (ids.length) await tryLoadBalances(ids[ids.length - 1]);
            } catch {}
          }
        } catch (err) {
          if (err.message === 'UNAUTHORIZED') handleLogout();
        }
      }, [patronKey]);

      const loadMindCounts = useCallback(async () => {
        try {
          const d = await api('/mind', patronKey);
          setMindCounts({
            samskaras: d.samskaras?.length || 0,
            desires: d.desires?.length || 0,
            experiences: d.experiences?.length || 0,
            sessionsSinceDr: d.operator_health?.sessions_since_dr ?? '?',
          });
        } catch {}
      }, [patronKey]);

      useEffect(() => {
        loadHealth();
        loadMindCounts();
        const iv = setInterval(() => { loadHealth(); loadMindCounts(); }, 10000);
        return () => clearInterval(iv);
      }, [loadHealth, loadMindCounts]);

      // Countdown timer for next session
      useEffect(() => {
        const nextSession = health?.schedule?.next_session_after;
        if (!nextSession) return;
        const target = new Date(nextSession).getTime();
        const tick = () => {
          const diff = target - Date.now();
          if (diff <= 0) { setCountdown('now'); return; }
          const h = Math.floor(diff / 3600000);
          const m = Math.floor((diff % 3600000) / 60000);
          const s = Math.floor((diff % 60000) / 1000);
          setCountdown(`${h}h ${m}m ${s}s`);
        };
        tick();
        const iv = setInterval(tick, 1000);
        return () => clearInterval(iv);
      }, [health?.schedule?.next_session_after]);

      if (!patronKey) return <LoginScreen onLogin={handleLogin} />;

      const tabs = [
        { id: 'timeline', label: 'Runs' },
        { id: 'chat', label: 'Chat' },
        { id: 'contacts', label: 'Contacts' },
        { id: 'kv', label: 'KV Explorer' },
        { id: 'reflections', label: 'Deep Reflect' },
        { id: 'mutations', label: 'Modifications' },
        { id: 'mind', label: 'Mind' },
      ];

      return (
        <div className="h-screen flex flex-col overflow-hidden">
          {/* Header + status bar */}
          <div className="bg-bg-panel border-b border-border px-4 py-2 flex items-center gap-4 text-xs">
            <span className="text-accent font-bold tracking-widest text-sm">SWAYAMBHU</span>
            <span className="text-gray-600">patron</span>
            {health && (
              <>
                <span className="text-gray-600">|</span>
                <span className="text-gray-500">Runs:</span>
                <span className="text-accent font-semibold">{health.sessionCounter || 0}</span>
                {countdown && (
                  <>
                    <span className="text-gray-600">|</span>
                    <span className="text-gray-500">Next run:</span>
                    <span className={`font-semibold ${countdown === 'now' ? 'text-green-400' : 'text-blue-400'}`}>
                      {countdown}
                    </span>
                  </>
                )}
                <span className="text-gray-600">|</span>
                <span className={`ml-1 px-2 py-0.5 rounded text-xs font-semibold ${
                  health.session
                    ? 'bg-green-900/30 text-green-400'
                    : countdown === 'now'
                      ? 'bg-yellow-900/30 text-yellow-400'
                      : 'bg-gray-800 text-gray-500'
                }`}>{health.session ? 'In session' : countdown === 'now' ? 'Starting' : 'Idle'}</span>
              </>
            )}
            {mindCounts && (
              <div className="flex items-center gap-3 text-gray-500 border-l border-gray-800 pl-3 ml-1">
                <span onClick={() => setActiveTab('mind')} className="cursor-pointer hover:text-green-400 transition">
                  <span className="text-green-400">●</span> {mindCounts.samskaras}s
                </span>
                <span onClick={() => setActiveTab('mind')} className="cursor-pointer hover:text-purple-400 transition">
                  <span className="text-purple-400">●</span> {mindCounts.desires}d
                </span>
                <span onClick={() => setActiveTab('mind')} className="cursor-pointer hover:text-cyan-400 transition">
                  <span className="text-cyan-400">●</span> {mindCounts.experiences}ε
                </span>
                <span className="text-gray-600">
                  DR:{mindCounts.sessionsSinceDr}
                </span>
              </div>
            )}
            <div className="flex items-center gap-2 ml-auto">
              {health && balances && (() => {
                const extract = (v) => typeof v === 'object' && v !== null ? v.balance : v;
                const items = [
                  ...Object.entries(balances.providers || {}).map(([n, v]) => [n, extract(v)]),
                  ...Object.entries(balances.wallets || {}).map(([n, v]) => [n, extract(v)]),
                ].filter(([, v]) => v != null && typeof v !== 'object');
                if (!items.length) return null;
                return (
                  <>
                    {items.map(([name, val]) => (
                      <React.Fragment key={name}>
                        <span className="text-gray-500">{name}:</span>
                        <span className={`font-semibold ${val > 5 ? 'text-green-400' : val > 1 ? 'text-yellow-400' : 'text-red-400'}`}>
                          ${typeof val === 'number' ? val.toFixed(2) : val}
                        </span>
                      </React.Fragment>
                    ))}
                    <span className="text-gray-700 mx-1">|</span>
                  </>
                );
              })()}
              <button
                onClick={handleLogout}
                className="text-gray-600 hover:text-gray-400 transition"
              >logout</button>
            </div>
          </div>

          {/* Tab bar */}
          <div className="bg-bg-panel border-b border-border px-4 flex gap-1">
            {tabs.map(tab => (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`px-3 py-1.5 text-xs font-semibold transition border-b-2 ${
                  activeTab === tab.id
                    ? 'border-accent text-accent'
                    : 'border-transparent text-gray-500 hover:text-gray-300'
                }`}
              >
                {tab.label}
              </button>
            ))}
          </div>

          {/* Direct message bar */}
          <DirectMessageBar patronKey={patronKey} />

          {/* Content — all tabs stay mounted (display:none) to preserve state */}
          <div ref={containerRef} className="flex-1 flex overflow-hidden">
            <div style={{ display: activeTab === 'timeline' ? 'flex' : 'none', width: '100%', height: '100%' }}>
              <div style={{ width: `${leftPct}%` }} className="flex-shrink-0 p-4 overflow-hidden flex flex-col">
                <TimelineTab patronKey={patronKey} onSelectEntry={setSelectedEntry} />
              </div>
              <DraggableDivider onDrag={handleDividerDrag} />
              <div style={{ width: `${100 - leftPct}%` }} className="flex-shrink-0 overflow-hidden bg-bg-panel flex flex-col">
                <ContextPanel patronKey={patronKey} selectedEntry={selectedEntry} />
              </div>
            </div>
            <div style={{ display: activeTab === 'chat' ? 'flex' : 'none', width: '100%', height: '100%' }}>
              <ChatTab patronKey={patronKey} />
            </div>
            <div style={{ display: activeTab === 'contacts' ? 'flex' : 'none', width: '100%', height: '100%' }}>
              <ContactsTab patronKey={patronKey} />
            </div>
            <div style={{ display: activeTab === 'kv' ? 'block' : 'none' }} className="flex-1 p-4 overflow-hidden">
              <KVExplorerTab patronKey={patronKey} />
            </div>
            <div style={{ display: activeTab === 'reflections' ? 'block' : 'none' }} className="flex-1 p-4 overflow-hidden">
              <ReflectionsTab patronKey={patronKey} />
            </div>
            <div style={{ display: activeTab === 'mutations' ? 'block' : 'none' }} className="flex-1 p-4 overflow-hidden">
              <MutationsTab patronKey={patronKey} />
            </div>
            <div style={{ display: activeTab === 'mind' ? 'block' : 'none' }} className="flex-1 overflow-auto">
              <MindTab patronKey={patronKey} />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

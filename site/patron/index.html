<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swayambhu — Patron Dashboard</title>
  <link rel="icon" type="image/png" href="../avatar.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark-dimmed.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0a0a0f',
            'bg-panel': '#0f0f18',
            'bg-card': '#14142a',
            border: '#1e1e3a',
            accent: '#f59e0b',
            'accent-dim': 'rgba(245, 158, 11, 0.12)',
            'deep': '#a78bfa',
            'deep-dim': 'rgba(167, 139, 250, 0.15)',
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    body { background: #0a0a0f; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #1e1e3a; border-radius: 3px; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fade-in 0.3s ease-out; }
    .md-prose { color: #d1d5db; line-height: 1.7; }
    .md-prose h1, .md-prose h2, .md-prose h3 { color: #f59e0b; font-weight: 700; margin: 0.75em 0 0.25em; }
    .md-prose h1 { font-size: 1.1em; } .md-prose h2 { font-size: 1em; } .md-prose h3 { font-size: 0.95em; }
    .md-prose p { margin: 0.4em 0; }
    .md-prose ul, .md-prose ol { margin: 0.4em 0; padding-left: 1.5em; }
    .md-prose li { margin: 0.2em 0; }
    .md-prose code { background: #1e1e3a; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.9em; color: #a5b4fc; }
    .md-prose pre { background: #0a0a0f; padding: 0.5em; border-radius: 4px; overflow-x: auto; margin: 0.4em 0; }
    .md-prose pre code { background: none; padding: 0; }
    .md-prose strong { color: #e5e7eb; }
    .md-prose em { color: #9ca3af; }
    .md-prose a { color: #60a5fa; text-decoration: underline; }
    .md-prose blockquote { border-left: 2px solid #1e1e3a; padding-left: 0.75em; color: #9ca3af; margin: 0.4em 0; }
    .divider-dragging { cursor: col-resize !important; user-select: none !important; }
  </style>
</head>
<body class="text-gray-300 font-mono min-h-screen">
  <div id="root"></div>
  <script src="config.js" onerror="/* optional config — defaults used */"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ── Config ────────────────────────────────────────────────
    const CFG = window.DASHBOARD_CONFIG || {};
    const TIMEZONE = CFG.timezone || undefined; // undefined = browser default
    const LOCALE = CFG.locale || undefined;
    const TRUNCATE_JSON = CFG.truncate?.jsonString || 800;
    const TRUNCATE_TEXT = CFG.truncate?.textBlock || 800;
    const WATCH_INTERVAL = CFG.watchIntervalMs || 2000;

    // Configure marked to use highlight.js for code blocks
    try {
      const renderer = { code({ text, lang }) {
        let h;
        try {
          h = lang && hljs.getLanguage(lang)
            ? hljs.highlight(text, { language: lang }).value
            : hljs.highlightAuto(text).value;
        } catch { h = text; }
        return '<pre><code class="hljs">' + h + '</code></pre>';
      }};
      if (marked.use) { marked.use({ renderer }); }
      else { marked.setOptions({ renderer }); }
    } catch (e) { console.warn('marked config failed:', e); }

    function looksLikeCode(text) {
      return /^\s*(import |export |const |let |var |function |async |class |\/\/|\/\*|module\.)/.test(text);
    }

    function formatTime(ts) {
      const opts = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
      if (TIMEZONE) opts.timeZone = TIMEZONE;
      return new Date(ts).toLocaleTimeString(LOCALE, opts);
    }

    function formatDateTime(ts) {
      const opts = { dateStyle: 'medium', timeStyle: 'short' };
      if (TIMEZONE) opts.timeZone = TIMEZONE;
      return new Date(ts).toLocaleString(LOCALE, opts);
    }

    const API_URL = (location.hostname === 'localhost' || location.protocol === 'file:')
      ? 'http://localhost:8790'
      : 'https://swayambhu-dashboard-api.swayambhu1.workers.dev';

    // ── API helpers ───────────────────────────────────────────
    const kvReadCount = { current: 0 };

    async function api(path, key, timeoutMs = 8000) {
      kvReadCount.current++;
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(`${API_URL}${path}`, {
          headers: { 'X-Patron-Key': key },
          signal: ctrl.signal,
        });
        if (res.status === 401) throw new Error('UNAUTHORIZED');
        return await res.json();
      } catch (err) {
        if (err.name === 'AbortError') throw new Error('TIMEOUT');
        throw err;
      } finally {
        clearTimeout(timer);
      }
    }

    // Browser-side cache for stable keys
    const stableCache = {};
    const STABLE_PREFIXES = ['dharma', 'wisdom', 'prompt:', 'tool:', 'provider:'];

    async function cachedApi(path, key) {
      const cacheKey = path;
      if (stableCache[cacheKey]) return stableCache[cacheKey];
      const data = await api(path, key);
      // Cache stable keys
      if (STABLE_PREFIXES.some(p => path.includes(p))) {
        stableCache[cacheKey] = data;
      }
      return data;
    }

    async function apiMulti(keys, patronKey) {
      if (!keys.length) return {};
      const encoded = keys.map(k => encodeURIComponent(k)).join(',');
      return api(`/kv/multi?keys=${encoded}`, patronKey);
    }

    // ── Event type colors ─────────────────────────────────────
    const EVENT_COLORS = {
      act_start: { bg: 'bg-green-900/30', border: 'border-green-700', text: 'text-green-400', dot: 'bg-green-500' },
      act_complete: { bg: 'bg-green-900/20', border: 'border-green-800', text: 'text-green-500', dot: 'bg-green-600' },
      llm_call: { bg: 'bg-blue-900/30', border: 'border-blue-700', text: 'text-blue-400', dot: 'bg-blue-500' },
      llm_response: { bg: 'bg-blue-900/20', border: 'border-blue-800', text: 'text-blue-400', dot: 'bg-blue-400' },
      tool_call: { bg: 'bg-purple-900/30', border: 'border-purple-700', text: 'text-purple-400', dot: 'bg-purple-500' },
      tool_result: { bg: 'bg-purple-900/20', border: 'border-purple-800', text: 'text-purple-400', dot: 'bg-purple-400' },
      fallback: { bg: 'bg-orange-900/30', border: 'border-orange-700', text: 'text-orange-400', dot: 'bg-orange-500' },
      fatal: { bg: 'bg-red-900/30', border: 'border-red-700', text: 'text-red-400', dot: 'bg-red-500' },
      error: { bg: 'bg-red-900/20', border: 'border-red-800', text: 'text-red-400', dot: 'bg-red-400' },
      mutation: { bg: 'bg-yellow-900/30', border: 'border-yellow-700', text: 'text-yellow-400', dot: 'bg-yellow-500' },
      kv_operations_requested: { bg: 'bg-yellow-900/20', border: 'border-yellow-800', text: 'text-yellow-400', dot: 'bg-yellow-400' },
      reflect: { bg: 'bg-teal-900/30', border: 'border-teal-700', text: 'text-teal-400', dot: 'bg-teal-500' },
      act: { bg: 'bg-cyan-900/30', border: 'border-cyan-700', text: 'text-cyan-400', dot: 'bg-cyan-500' },
      subplan: { bg: 'bg-indigo-900/30', border: 'border-indigo-700', text: 'text-indigo-400', dot: 'bg-indigo-500' },
      dr_dispatched: { bg: 'bg-teal-900/30', border: 'border-teal-700', text: 'text-teal-400', dot: 'bg-teal-500' },
      dr_failed: { bg: 'bg-red-900/30', border: 'border-red-700', text: 'text-red-400', dot: 'bg-red-500' },
      dr_expired: { bg: 'bg-orange-900/30', border: 'border-orange-700', text: 'text-orange-400', dot: 'bg-orange-500' },
      dr_applied: { bg: 'bg-teal-900/30', border: 'border-teal-700', text: 'text-teal-400', dot: 'bg-teal-500' },
      dr_dispatch_failed: { bg: 'bg-red-900/20', border: 'border-red-800', text: 'text-red-400', dot: 'bg-red-400' },
      dr_apply_blocked: { bg: 'bg-yellow-900/30', border: 'border-yellow-700', text: 'text-yellow-400', dot: 'bg-yellow-500' },
      dr_cycle_error: { bg: 'bg-red-900/30', border: 'border-red-700', text: 'text-red-400', dot: 'bg-red-500' },
    };

    function eventColor(type) {
      return EVENT_COLORS[type] || { bg: 'bg-gray-900/30', border: 'border-gray-700', text: 'text-gray-400', dot: 'bg-gray-500' };
    }

    // ── JSON viewer ───────────────────────────────────────────
    function ExpandableString({ text, limit = TRUNCATE_JSON }) {
      const [expanded, setExpanded] = useState(false);
      const isCode = looksLikeCode(text);
      const isMd = !isCode && looksLikeMarkdown(text);
      const hasToggle = isCode || isMd;
      const [mode, setMode] = useState(isCode ? 'code' : 'raw');
      const displayText = expanded || text.length <= limit ? text : text.slice(0, limit) + '…';

      if (text.length <= limit && !hasToggle) {
        return <span className="text-green-400 [overflow-wrap:anywhere] whitespace-pre-wrap leading-relaxed">"{text}"</span>;
      }

      const nextMode = mode === 'raw' ? (isCode ? 'code' : 'rendered') : 'raw';
      const nextLabel = nextMode === 'raw' ? 'raw' : isCode ? 'highlighted' : 'rendered';

      return (
        <div className="inline">
          {hasToggle && (
            <button
              onClick={(e) => { e.stopPropagation(); setMode(nextMode); }}
              className="text-[10px] text-gray-500 hover:text-accent border border-gray-700 rounded px-1.5 py-0.5 mr-1 mb-1"
            >{nextLabel}</button>
          )}
          {mode === 'code' ? (
            <HighlightedCode code={displayText} />
          ) : mode === 'rendered' ? (
            <div
              className="md-prose text-xs"
              dangerouslySetInnerHTML={{ __html: marked.parse(displayText) }}
            />
          ) : (
            <span className="text-green-400 [overflow-wrap:anywhere] whitespace-pre-wrap leading-relaxed">
              "{displayText}"
            </span>
          )}
          {text.length > limit && (
            <button
              onClick={(e) => { e.stopPropagation(); setExpanded(!expanded); }}
              className="ml-1 text-accent/70 hover:text-accent text-[10px] underline"
            >{expanded ? 'less' : 'more'}</button>
          )}
        </div>
      );
    }

    function JsonView({ data, depth = 0 }) {
      if (data === null || data === undefined) return <span className="text-gray-500">null</span>;
      if (typeof data === 'string') {
        if (data.length > TRUNCATE_JSON) return <ExpandableString text={data} />;
        return <span className="text-green-400 [overflow-wrap:anywhere] whitespace-pre-wrap leading-relaxed">"{data}"</span>;
      }
      if (typeof data === 'number') return <span className="text-amber-400">{data}</span>;
      if (typeof data === 'boolean') return <span className="text-purple-400">{String(data)}</span>;
      if (Array.isArray(data)) {
        if (data.length === 0) return <span className="text-gray-500">[]</span>;
        return (
          <div className="ml-4">
            <span className="text-gray-500">[</span>
            {data.map((item, i) => (
              <div key={i} className="ml-2">
                <JsonView data={item} depth={depth + 1} />
                {i < data.length - 1 && <span className="text-gray-600">,</span>}
              </div>
            ))}
            <span className="text-gray-500">]</span>
          </div>
        );
      }
      if (typeof data === 'object') {
        const entries = Object.entries(data);
        if (entries.length === 0) return <span className="text-gray-500">{'{}'}</span>;
        return (
          <div className="ml-4">
            <span className="text-gray-500">{'{'}</span>
            {entries.map(([k, v], i) => (
              <div key={k} className="ml-2">
                <span className="text-cyan-400">"{k}"</span>
                <span className="text-gray-500">: </span>
                <JsonView data={v} depth={depth + 1} />
                {i < entries.length - 1 && <span className="text-gray-600">,</span>}
              </div>
            ))}
            <span className="text-gray-500">{'}'}</span>
          </div>
        );
      }
      return <span>{String(data)}</span>;
    }

    function JsonTreeString({ text }) {
      const [expanded, setExpanded] = useState(false);

      // Detect JSON strings and offer to render as a tree
      const parsed = useMemo(() => {
        if (text.length < 2) return null;
        const c = text[0];
        if (c !== '{' && c !== '[') return null;
        try { return JSON.parse(text); } catch { return null; }
      }, [text]);

      if (parsed) {
        return <JsonTree data={parsed} />;
      }

      const long = text.length > 120;
      const display = long && !expanded ? text.slice(0, 120) + '...' : text;
      return (
        <>
          <span className="text-green-400 [overflow-wrap:anywhere] whitespace-pre-wrap">"{display}"</span>
          {long && (
            <button
              onClick={(e) => { e.stopPropagation(); setExpanded(!expanded); }}
              className="text-accent/70 hover:text-accent text-[10px] underline ml-1"
            >{expanded ? 'less' : `(${text.length} chars)`}</button>
          )}
        </>
      );
    }

    // Collapsible JSON tree — nodes start collapsed, click to expand
    function JsonTree({ data, label, defaultOpen = false }) {
      const [open, setOpen] = useState(defaultOpen);

      if (data === null || data === undefined) {
        return <span className="text-gray-500">{label ? <><span className="text-cyan-400">"{label}"</span><span className="text-gray-500">: </span></> : null}null</span>;
      }
      const labelEl = label != null
        ? <><span className={typeof label === 'number' ? "text-gray-400" : "text-cyan-400"}>{typeof label === 'number' ? label : `"${label}"`}</span><span className="text-gray-500">: </span></>
        : null;

      if (typeof data === 'string') {
        return (
          <div className="leading-relaxed">
            {labelEl}
            <JsonTreeString text={data} />
          </div>
        );
      }
      if (typeof data === 'number') {
        return <div>{labelEl}<span className="text-amber-400">{data}</span></div>;
      }
      if (typeof data === 'boolean') {
        return <div>{labelEl}<span className="text-purple-400">{String(data)}</span></div>;
      }

      const isArray = Array.isArray(data);
      const entries = isArray ? data.map((v, i) => [i, v]) : Object.entries(data);
      const isEmpty = entries.length === 0;
      const preview = isArray ? `[${entries.length}]` : `{${entries.length}}`;

      if (isEmpty) {
        return (
          <div>
            {label && <><span className="text-cyan-400">"{label}"</span><span className="text-gray-500">: </span></>}
            <span className="text-gray-500">{isArray ? '[]' : '{}'}</span>
          </div>
        );
      }

      return (
        <div>
          <div
            onClick={(e) => { e.stopPropagation(); setOpen(!open); }}
            className="cursor-pointer hover:bg-white/5 rounded px-1 -mx-1 select-none"
          >
            <span className="text-gray-500 inline-block w-3 text-center">{open ? '▾' : '▸'}</span>
            {label != null && <><span className={isArray && typeof label === 'number' ? "text-gray-400" : "text-cyan-400"}>{typeof label === 'number' ? label : `"${label}"`}</span><span className="text-gray-500">: </span></>}
            <span className="text-gray-500">{preview}</span>
          </div>
          {open && (
            <div className="ml-4 border-l border-gray-800 pl-2">
              {entries.map(([k, v]) => (
                <JsonTree key={k} data={v} label={k} defaultOpen={entries.length === 1} />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── Login screen ──────────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [key, setKey] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          await api('/health', key);
          onLogin(key);
        } catch (err) {
          setError(err.message === 'UNAUTHORIZED' ? 'Invalid key' : 'Connection failed');
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center">
          <form onSubmit={handleSubmit} className="bg-bg-panel border border-border rounded-lg p-8 w-full max-w-sm">
            <h1 className="text-accent font-bold text-lg tracking-widest mb-1">SWAYAMBHU</h1>
            <p className="text-gray-500 text-sm mb-6">Patron Dashboard</p>
            <input
              type="password"
              value={key}
              onChange={(e) => setKey(e.target.value)}
              placeholder="Patron key"
              className="w-full bg-bg border border-border rounded px-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-accent mb-4"
              autoFocus
            />
            {error && <p className="text-red-400 text-xs mb-3">{error}</p>}
            <button
              type="submit"
              disabled={loading || !key}
              className="w-full bg-accent/20 border border-accent text-accent font-semibold py-2.5 rounded text-sm hover:bg-accent/30 transition disabled:opacity-40"
            >
              {loading ? 'Connecting...' : 'Enter'}
            </button>
          </form>
        </div>
      );
    }

    // ── Timeline Tab ──────────────────────────────────────────
    function TimelineTab({ patronKey, onSelectEntry }) {
      const [sessions, setSessions] = useState([]);       // [{id, type, ts}]
      const [selectedSession, setSelectedSession] = useState(null);
      const [karma, setKarma] = useState([]);
      const [loading, setLoading] = useState(false);
      const [watching, setWatching] = useState(false);
      const watchRef = useRef(null);
      const karmaRef = useRef([]);
      const initialLoadRef = useRef(true);

      const refreshSessions = useCallback(async () => {
        try {
          const d = await api('/sessions', patronKey);
          const list = (d.sessions || []).filter(s => s.type !== 'deep_reflect').reverse();
          if (list.length > 0) {
            setSessions(list);
            setSelectedSession(prev => prev || list[0].id);
            return list;
          }
        } catch {}
        // Fallback: try cache:session_ids
        try {
          const d = await api('/kv/cache:session_ids', patronKey);
          const ids = d.value || [];
          if (ids.length > 0) {
            const list = ids.reverse().map(id => ({ id, type: 'act', ts: null }));
            setSessions(list);
            setSelectedSession(prev => prev || list[0].id);
            return list;
          }
        } catch {}
        return [];
      }, [patronKey]);

      useEffect(() => {
        refreshSessions();
        // Poll for sessions until we find some
        const poll = setInterval(async () => {
          const ids = await refreshSessions();
          if (ids.length > 0) clearInterval(poll);
        }, 5000);
        return () => clearInterval(poll);
      }, [refreshSessions]);

      const loadKarma = useCallback(async (sid) => {
        if (!sid) return;
        setLoading(true);
        try {
          const d = await api(`/kv/karma:${sid}`, patronKey);
          if (d.error) {
            // Session not found — refresh session list
            const fresh = await refreshSessions();
            if (fresh.length > 0 && !fresh.some(s => s.id === sid)) {
              setSelectedSession(fresh[fresh.length - 1].id);
            }
            setKarma([]); karmaRef.current = [];
            setLoading(false);
            return;
          }
          const entries = (d.value || []).map(e => ({
            ...e,
            type: e.type || e.event,
            ts: e.ts || (e.t ? new Date(e.t).toISOString() : null),
          }));
          setKarma(entries);
          karmaRef.current = entries;
        } catch { setKarma([]); karmaRef.current = []; }
        setLoading(false);
      }, [patronKey]);

      useEffect(() => {
        if (!selectedSession) return;
        loadKarma(selectedSession);
        if (initialLoadRef.current) {
          initialLoadRef.current = false;
          startWatching();
        } else {
          // Switching sessions — stop watching
          if (watchRef.current) { clearInterval(watchRef.current); watchRef.current = null; }
          setWatching(false);
        }
        return () => { if (watchRef.current) { clearInterval(watchRef.current); watchRef.current = null; } };
      }, [selectedSession, loadKarma, startWatching]);

      const startWatching = useCallback(() => {
        if (watchRef.current) return;
        watchRef.current = setInterval(async () => {
          try {
            const d = await api(`/kv/karma:${selectedSession}`, patronKey);
            if (d.error) {
              const fresh = await refreshSessions();
              if (fresh.length > 0) setSelectedSession(fresh[fresh.length - 1].id);
              clearInterval(watchRef.current);
              watchRef.current = null;
              setWatching(false);
              return;
            }
            const entries = (d.value || []).map(e => ({
              ...e,
              type: e.type || e.event,
              ts: e.ts || (e.t ? new Date(e.t).toISOString() : null),
            }));
            if (entries.length > karmaRef.current.length) {
              setKarma(entries);
              karmaRef.current = entries;
            }
            try {
              const h = await api('/health', patronKey);
              if (!h.session) {
                clearInterval(watchRef.current);
                watchRef.current = null;
                setWatching(false);
              }
            } catch {}
          } catch {}
        }, WATCH_INTERVAL);
        setWatching(true);
      }, [selectedSession, patronKey]);

      const toggleWatch = () => {
        if (watching) {
          clearInterval(watchRef.current);
          watchRef.current = null;
          setWatching(false);
        } else {
          loadKarma(selectedSession);
          startWatching();
        }
      };

      // Precompute request-response pairs (tool_start↔tool_complete)
      const [selectedIdx, setSelectedIdx] = useState(null);
      const pairs = useMemo(() => {
        const map = {};
        const byStepId = {}; // step_id -> index of tool_start
        karma.forEach((e, i) => {
          if (e.type === 'tool_call' || e.type === 'tool_start') {
            if (e.step_id) byStepId[e.step_id] = i;
          } else if (e.type === 'tool_complete' || e.type === 'tool_result') {
            const startIdx = e.step_id ? byStepId[e.step_id] : undefined;
            if (startIdx != null) {
              map[startIdx] = i;
              map[i] = startIdx;
            }
          }
        });
        return map;
      }, [karma]);
      const pairedIdx = selectedIdx != null ? pairs[selectedIdx] : null;

      // Compute running stats
      const stats = useMemo(() => {
        if (!karma.length) return null;
        const first = karma[0];
        const last = karma[karma.length - 1];
        const elapsed = first.ts && last.ts
          ? Math.round((new Date(last.ts) - new Date(first.ts)) / 1000)
          : 0;
        const cost = karma.reduce((sum, e) => sum + (e.cost || 0), 0);
        const llmCalls = karma.filter(e => e.type === 'llm_call').length;
        const toolCalls = karma.filter(e => e.type === 'tool_call' || e.type === 'tool_start').length;
        return { elapsed, cost, llmCalls, toolCalls, total: llmCalls + toolCalls };
      }, [karma]);

      return (
        <div className="flex flex-col h-full">
          {/* Session selector + stats */}
          <div className="flex items-center gap-3 mb-2 flex-wrap text-xs">
            <select
              value={selectedSession || ''}
              onChange={(e) => setSelectedSession(e.target.value)}
              className="bg-bg border border-border rounded px-2 py-1 text-xs text-gray-300 focus:outline-none focus:border-accent"
            >
              {sessions.map(s => (
                <option key={s.id} value={s.id}>{s.id}</option>
              ))}
            </select>
            <button
              onClick={toggleWatch}
              className={`px-2 py-1 rounded font-semibold border transition ${
                watching
                  ? 'bg-green-900/30 border-green-700 text-green-400'
                  : 'bg-bg border-border text-gray-400 hover:border-accent hover:text-accent'
              }`}
            >
              {watching && <span className="inline-block w-2 h-2 rounded-full bg-green-400 pulse-dot mr-1.5"></span>}
              {watching ? 'Watching' : 'Watch'}
            </button>
            {stats && (
              <>
                <span className="text-gray-700">|</span>
                <span className="whitespace-nowrap"><span className="text-gray-500">Requests: </span><span className="text-accent">{stats.total}</span> <span className="text-gray-600">({stats.llmCalls} LLM, {stats.toolCalls} tool)</span></span>
                <span className="whitespace-nowrap"><span className="text-gray-500">Elapsed: </span><span className="text-gray-300">{stats.elapsed}s</span></span>
                {stats.cost > 0 && (
                  <span className="whitespace-nowrap"><span className="text-gray-500">Cost: </span><span className="text-green-400">${stats.cost.toFixed(4)}</span></span>
                )}
              </>
            )}
          </div>

          {/* Karma entries — grouped into Act and Deep Reflect sections */}
          <div className="flex-1 overflow-y-auto scrollbar-thin space-y-1.5">
            {loading && <p className="text-gray-500 text-sm">Loading karma...</p>}
            {!loading && karma.length === 0 && (
              <p className="text-gray-500 text-sm">No karma entries found</p>
            )}
            {(() => {
              // Classify entries into act session vs deep reflect
              const isDrEvent = (e) =>
                (e.event || e.type || '').startsWith('dr_') ||
                ((e.event || e.type) === 'tool_start' && e.step_id?.startsWith('dr_')) ||
                ((e.event || e.type) === 'tool_complete' && e.step_id?.startsWith('dr_'));

              const actEntries = [];
              const drEntries = [];
              karma.forEach((entry, i) => {
                if (isDrEvent(entry)) {
                  drEntries.push({ entry, i });
                } else {
                  actEntries.push({ entry, i });
                }
              });

              const renderEntry = ({ entry, i }) => {
                const c = eventColor(entry.type);
                const isResponse = ['llm_response', 'tool_complete', 'tool_result'].includes(entry.type);
                const isSelected = selectedIdx === i;
                const isPaired = pairedIdx === i;
                return (
                  <div
                    key={i}
                    onClick={() => { setSelectedIdx(i); onSelectEntry({ ...entry, _idx: i }); }}
                    className={`${c.bg} border ${c.border} rounded px-3 py-2 cursor-pointer hover:brightness-125 transition text-xs fade-in ${isResponse ? 'opacity-75' : ''} ${isSelected ? 'ring-1 ring-accent' : ''} ${isPaired ? 'ring-1 ring-accent/50 brightness-125' : ''}`}
                  >
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-gray-600 text-[10px] w-5 text-right flex-shrink-0 tabular-nums">{i + 1}</span>
                      <span className={`w-2 h-2 rounded-full ${c.dot} flex-shrink-0 ${isResponse ? 'w-1.5 h-1.5' : ''}`}></span>
                      <span className={`${c.text} ${isResponse ? '' : 'font-semibold'}`}>{entry.type}</span>
                      {(isSelected || isPaired) && pairs[i] != null && (
                        <span className="text-accent/60 text-[10px]">{isResponse ? 'response' : 'request'}</span>
                      )}
                      {entry.ts && (
                        <span className="text-gray-500 ml-auto">{formatTime(entry.ts)}</span>
                      )}
                    </div>
                    {entry.tool && <span className="text-purple-300 ml-4">{entry.tool}</span>}
                    {entry.model && <span className="text-blue-300 ml-4">{entry.model}</span>}
                    {entry.summary && <p className="text-gray-400 ml-4 mt-1 truncate">{entry.summary}</p>}
                    {entry.error && <p className="text-red-300 ml-4 mt-1 truncate">{entry.error}</p>}
                  </div>
                );
              };

              return (
                <>
                  {actEntries.length > 0 && (
                    <>
                      <div className="flex items-center gap-2 pt-1 pb-0.5">
                        <span className="text-[10px] font-semibold uppercase tracking-wider text-green-500">Act</span>
                        <div className="flex-1 border-t border-green-900/50"></div>
                      </div>
                      {actEntries.map(renderEntry)}
                    </>
                  )}
                  {drEntries.length > 0 && (
                    <>
                      <div className="flex items-center gap-2 pt-3 pb-0.5">
                        <span className="text-[10px] font-semibold uppercase tracking-wider text-teal-500">Deep Reflect</span>
                        <div className="flex-1 border-t border-teal-900/50"></div>
                      </div>
                      {drEntries.map(renderEntry)}
                    </>
                  )}
                </>
              );
            })()}
          </div>
        </div>
      );
    }

    // ── Detail field renderer ──────────────────────────────────
    function looksLikeMarkdown(text) {
      return /^#{1,3}\s|^\s*[-*]\s|\*\*|__|\[.*\]\(|```/m.test(text);
    }

    function HighlightedCode({ code }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current) {
          ref.current.textContent = code;
          hljs.highlightElement(ref.current);
        }
      }, [code]);
      return (
        <pre className="rounded text-xs overflow-x-auto"><code ref={ref} className="javascript">{code}</code></pre>
      );
    }

    function tryParseJSON(text) {
      const t = text.trim();
      if ((t[0] === '{' && t[t.length - 1] === '}') || (t[0] === '[' && t[t.length - 1] === ']')) {
        try { return JSON.parse(t); } catch {}
      }
      return null;
    }

    function ExpandableText({ text, limit = TRUNCATE_TEXT, color = 'text-gray-300' }) {
      const [expanded, setExpanded] = useState(false);
      const parsedJSON = tryParseJSON(text);
      const isJSON = parsedJSON !== null;
      const isCode = !isJSON && looksLikeCode(text);
      const isMd = !isJSON && !isCode && looksLikeMarkdown(text);
      const defaultMode = isJSON ? 'json' : isCode ? 'code' : isMd ? 'rendered' : 'raw';
      const [mode, setMode] = useState(defaultMode);
      useEffect(() => { setMode(defaultMode); }, [defaultMode]);
      const displayText = expanded || text.length <= limit ? text : text.slice(0, limit) + '…';

      const hasToggle = isCode || isMd || isJSON;
      const nextMode = mode === 'raw' ? defaultMode : 'raw';
      const nextLabel = nextMode === 'raw' ? 'raw' : isJSON ? 'formatted' : isCode ? 'highlighted' : 'rendered';

      return (
        <div>
          {hasToggle && (
            <div className="flex justify-end mb-1">
              <button
                onClick={(e) => { e.stopPropagation(); setMode(nextMode); }}
                className="text-[10px] text-gray-500 hover:text-accent border border-gray-700 rounded px-1.5 py-0.5"
              >{nextLabel}</button>
            </div>
          )}
          {mode === 'json' ? (
            <JsonView data={parsedJSON} />
          ) : mode === 'code' ? (
            <HighlightedCode code={displayText} />
          ) : mode === 'rendered' ? (
            <div
              className="md-prose text-xs"
              dangerouslySetInnerHTML={{ __html: marked.parse(displayText) }}
            />
          ) : (
            <pre className={`${color} whitespace-pre-wrap break-words leading-relaxed`}>{displayText}</pre>
          )}
          {!isJSON && text.length > limit && (
            <button
              onClick={(e) => { e.stopPropagation(); setExpanded(!expanded); }}
              className="text-accent/70 hover:text-accent text-[10px] underline mt-1"
            >{expanded ? 'show less' : 'show more'}</button>
          )}
        </div>
      );
    }

    // ── Context Panel ─────────────────────────────────────────
    function ContextPanel({ patronKey, selectedEntry }) {
      if (!selectedEntry) {
        return (
          <div className="h-full flex items-center justify-center p-4">
            <p className="text-gray-600 text-xs text-center">
              Select an event in the timeline<br/>to see details here
            </p>
          </div>
        );
      }

      const entry = selectedEntry;
      const c = eventColor(entry.type);

      return (
        <div className="h-full flex flex-col">
          {/* Pinned header */}
          <div className={`flex-shrink-0 ${c.bg} border ${c.border} rounded px-3 py-2 m-4 mb-0`}>
            <div className="flex items-center gap-2">
              <span className={`w-2 h-2 rounded-full ${c.dot}`}></span>
              {entry._idx != null && <span className="text-gray-600 text-[10px]">#{entry._idx + 1}</span>}
              <span className={`${c.text} font-bold text-sm`}>{entry.type}</span>
              {entry.ts && (
                <span className="text-gray-500 text-xs ml-auto">{formatTime(entry.ts)}</span>
              )}
            </div>
            {entry.tool && (
              <div className="mt-1 ml-4">
                <span className="text-purple-300 text-sm font-semibold">{entry.tool}</span>
              </div>
            )}
            {entry.model && (
              <div className="mt-1 ml-4 text-blue-300 text-xs">{entry.model}</div>
            )}
          </div>

          {/* Collapsible JSON tree */}
          <div className="flex-1 overflow-y-auto scrollbar-thin p-4 text-xs font-mono">
            <JsonTree data={entry} defaultOpen={true} />
          </div>
        </div>
      );
    }

    // ── Shared error/retry component ─────────────────────────
    function LoadError({ error, onRetry }) {
      const msg = error === 'TIMEOUT' ? 'Request timed out' : 'Failed to load data';
      return (
        <div className="flex items-center gap-3 text-sm">
          <span className="text-red-400">{msg}</span>
          {onRetry && (
            <button onClick={onRetry} className="text-accent hover:text-amber-300 underline text-xs">
              Retry
            </button>
          )}
        </div>
      );
    }

    // ── KV Explorer Tab ───────────────────────────────────────
    function KVExplorerTab({ patronKey }) {
      const [index, setIndex] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [expandedKey, setExpandedKey] = useState(null);
      const [keyValue, setKeyValue] = useState(null);
      const [keyLoading, setKeyLoading] = useState(false);

      const loadIndex = useCallback(() => {
        setLoading(true); setError(null);
        api('/kv', patronKey)
          .then(d => { setIndex(d.keys || []); setLoading(false); })
          .catch(e => { setError(e.message); setLoading(false); });
      }, [patronKey]);

      useEffect(() => { loadIndex(); }, [loadIndex]);

      // Group by prefix
      const grouped = useMemo(() => {
        const groups = {};
        index.forEach(entry => {
          const key = entry.key;
          const colon = key.indexOf(':');
          const prefix = colon > 0 ? key.slice(0, colon) : '_root';
          if (!groups[prefix]) groups[prefix] = [];
          groups[prefix].push(entry);
        });
        return Object.entries(groups).sort(([a], [b]) => a.localeCompare(b));
      }, [index]);

      const [collapsedGroups, setCollapsedGroups] = useState(new Set());

      const toggleGroup = (prefix) => {
        setCollapsedGroups(prev => {
          const next = new Set(prev);
          next.has(prefix) ? next.delete(prefix) : next.add(prefix);
          return next;
        });
      };

      const fetchKey = async (key) => {
        if (expandedKey === key) { setExpandedKey(null); return; }
        setExpandedKey(key);
        setKeyLoading(true);
        try {
          const d = await api(`/kv/${encodeURIComponent(key)}`, patronKey);
          setKeyValue(d.value);
        } catch { setKeyValue('(error fetching)'); }
        setKeyLoading(false);
      };

      return (
        <div className="h-full overflow-y-auto scrollbar-thin">
          {loading && <p className="text-gray-500 text-sm">Loading index...</p>}
          {error && <LoadError error={error} onRetry={loadIndex} />}
          <div className="flex items-center gap-3 mb-3">
            <span className="text-xs text-gray-500">{index.length} keys total</span>
            <button onClick={loadIndex} className="text-gray-600 hover:text-gray-400 text-xs">refresh</button>
          </div>
          {grouped.map(([prefix, entries]) => (
            <div key={prefix} className="mb-2">
              <button
                onClick={() => toggleGroup(prefix)}
                className="flex items-center gap-2 text-sm font-semibold text-accent hover:text-amber-300 transition w-full text-left py-1"
              >
                <span className="text-gray-500">{collapsedGroups.has(prefix) ? '▸' : '▾'}</span>
                {prefix}
                <span className="text-gray-600 text-xs font-normal">({entries.length})</span>
              </button>
              {!collapsedGroups.has(prefix) && (
                <div className="ml-4 space-y-0.5">
                  {entries.map(entry => (
                    <div key={entry.key}>
                      <button
                        onClick={() => fetchKey(entry.key)}
                        className={`text-xs py-1 px-2 rounded w-full text-left transition ${
                          expandedKey === entry.key
                            ? 'bg-accent/10 text-accent'
                            : 'text-gray-400 hover:text-gray-200 hover:bg-bg-card'
                        }`}
                      >
                        {entry.key}
                      </button>
                      {expandedKey === entry.key && (
                        <div className="ml-2 mt-1 mb-2 bg-bg rounded p-2 text-xs fade-in">
                          {keyLoading ? (
                            <span className="text-gray-500">Loading...</span>
                          ) : typeof keyValue === 'string' ? (
                            <ExpandableText text={keyValue} />
                          ) : (
                            <JsonView data={keyValue} />
                          )}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    // ── Reflections Tab ───────────────────────────────────────
    function ReflectionsTab({ patronKey }) {
      const [drSessions, setDrSessions] = useState([]);
      const [selectedDr, setSelectedDr] = useState(null);
      const [drData, setDrData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [drLoading, setDrLoading] = useState(false);

      useEffect(() => {
        api('/sessions', patronKey).then(d => {
          const drs = (d.sessions || []).filter(s => s.type === 'deep_reflect').reverse();
          setDrSessions(drs);
          if (drs.length > 0) setSelectedDr(drs[0].id);
          setLoading(false);
        }).catch(() => setLoading(false));
      }, [patronKey]);

      useEffect(() => {
        if (!selectedDr) return;
        setDrLoading(true);
        api(`/deep-reflect/${encodeURIComponent(selectedDr)}`, patronKey)
          .then(d => { setDrData(d); setDrLoading(false); })
          .catch(() => { setDrData(null); setDrLoading(false); });
      }, [selectedDr, patronKey]);

      if (loading) return <div className="p-8 text-gray-500 text-sm">Loading deep reflect sessions...</div>;
      if (drSessions.length === 0) return <div className="p-8 text-gray-500 text-sm">No deep reflect sessions yet</div>;

      const strengthColor = (s) => s > 0.7 ? '#22c55e' : s > 0.3 ? '#f59e0b' : '#ef4444';

      return (
        <div className="flex flex-col h-full">
          {/* DR selector bar */}
          <div className="px-4 py-2 bg-bg-panel border-b border-border flex items-center gap-3 text-xs flex-shrink-0">
            <span className="text-purple-400 font-semibold">Deep Reflect</span>
            <select
              value={selectedDr || ''}
              onChange={e => setSelectedDr(e.target.value)}
              className="bg-bg-card border border-border text-gray-200 px-2 py-1 rounded text-xs"
            >
              {drSessions.map((s, i) => (
                <option key={s.id} value={s.id}>
                  DR #{drSessions.length - i} {'\u2014'} {s.id}
                </option>
              ))}
            </select>
            {drData?.execution && (
              <div className="ml-auto flex gap-3 text-gray-500">
                <span>Cost: <span className="text-gray-200">${drData.execution.cost?.toFixed(4)}</span></span>
                <span>Duration: <span className="text-gray-200">{Math.round((drData.execution.duration_ms || 0) / 1000)}s</span></span>
                {drData.execution.model && (
                  <span>Model: <span className="text-gray-200">{drData.execution.model}</span></span>
                )}
              </div>
            )}
          </div>

          {drLoading ? (
            <div className="p-8 text-gray-500 text-sm">Loading...</div>
          ) : drData ? (
            <div className="flex flex-1 overflow-hidden">
              {/* Left: Accumulation period */}
              <div className="overflow-y-auto flex-shrink-0 border-r border-border" style={{ width: 280 }}>
                <div className="px-3 py-2 border-b border-border" style={{ background: 'rgba(255,255,255,0.02)' }}>
                  <div style={{ fontSize: 10, color: '#06b6d4', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 2 }}>Accumulation Period</div>
                  <div className="text-xs text-gray-500">{drData.accumulation?.act_sessions || 0} act sessions</div>
                </div>

                <div className="px-3 py-2 border-b border-border">
                  <div style={{ fontSize: 10, color: '#888', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>Pipeline Health</div>
                  <div className="space-y-1 text-xs">
                    <div className="flex items-center gap-1.5">
                      <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#22c55e', display: 'inline-block' }} />
                      <span className="text-gray-300">Eval: {drData.accumulation?.eval_count || 0} computed</span>
                    </div>
                    <div className="flex items-center gap-1.5">
                      <span style={{ width: 6, height: 6, borderRadius: '50%', background: (drData.accumulation?.tier3_fallbacks || 0) > 0 ? '#f59e0b' : '#22c55e', display: 'inline-block' }} />
                      <span className="text-gray-300">Tier 3 fallback: {drData.accumulation?.tier3_fallbacks || 0}x</span>
                    </div>
                    <div className="flex items-center gap-1.5">
                      <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#22c55e', display: 'inline-block' }} />
                      <span className="text-gray-300">Experiences: {drData.accumulation?.experiences_total || 0} recorded</span>
                    </div>
                  </div>
                </div>

                <div className="px-3 py-2">
                  <div style={{ fontSize: 10, color: '#06b6d4', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>
                    Experiences ({drData.experiences?.length || 0})
                  </div>
                  {(drData.experiences || []).map(e => (
                    <div key={e.key} className="mb-1.5 rounded" style={{ padding: '5px 8px', background: 'rgba(6,182,212,0.06)', borderLeft: '2px solid #06b6d4' }}>
                      <div style={{ fontSize: 10, display: 'flex', justifyContent: 'space-between' }}>
                        <span style={{ color: '#06b6d4' }}>{'\u03c3'}={e.surprise_score?.toFixed(1) || '?'}</span>
                        <span style={{ color: '#f59e0b', fontSize: 9 }}>sal={e.salience?.toFixed(2) || '?'}</span>
                      </div>
                      <div style={{ fontSize: 11, color: '#bbb', marginTop: 2 }}>
                        {(e.narrative || e.action_taken || '(no narrative)').slice(0, 60)}
                        {(e.narrative || '').length > 60 ? '\u2026' : ''}
                      </div>
                    </div>
                  ))}
                  {(!drData.experiences || drData.experiences.length === 0) && (
                    <div className="text-xs text-gray-600">No experiences in this period</div>
                  )}
                </div>
              </div>

              {/* Right: DR Execution */}
              <div className="flex-1 overflow-y-auto">
                <div className="p-4">
                  <div style={{ fontSize: 10, color: '#888', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>Reflection</div>
                  {drData.execution?.reflection ? (
                    <div style={{ fontSize: 12, color: '#d4d4d4', lineHeight: 1.6, padding: 12, background: 'rgba(255,255,255,0.03)', borderRadius: 6, borderLeft: '3px solid #a78bfa' }}>
                      {drData.execution.reflection}
                    </div>
                  ) : (
                    <div className="text-xs text-gray-600">No reflection text</div>
                  )}
                </div>

                {drData.execution?.s_output?.length > 0 && (
                  <div className="px-4 pb-4">
                    <div style={{ fontSize: 10, color: '#22c55e', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>S Operator {'\u2192'} Samskaras</div>
                    {drData.execution.s_output.map((s, i) => {
                      const isDelete = s.action === 'deleted';
                      const col = isDelete ? '#ef4444' : '#22c55e';
                      return (
                        <div key={i} className="mb-2 rounded-md" style={{ padding: '8px 10px', background: `${col}0a`, border: `1px solid ${col}25` }}>
                          <div className="flex justify-between items-center">
                            <div>
                              <span style={{ fontSize: 10, color: col, fontWeight: 600, textTransform: 'uppercase' }}>{isDelete ? 'DELETED' : 'WRITTEN'}</span>
                              <span className="text-gray-300 text-xs ml-2">{s.key}</span>
                            </div>
                            {s.strength != null && (
                              <span style={{ fontSize: 12, color: strengthColor(s.strength), fontWeight: 'bold', fontFamily: 'monospace' }}>{s.strength.toFixed(2)}</span>
                            )}
                          </div>
                          {s.pattern && <div className="text-gray-400 text-xs mt-1">"{s.pattern}"</div>}
                        </div>
                      );
                    })}
                  </div>
                )}

                {drData.execution?.d_output?.length > 0 && (
                  <div className="px-4 pb-4">
                    <div style={{ fontSize: 10, color: '#a78bfa', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>D Operator {'\u2192'} Desires</div>
                    {drData.execution.d_output.map((d, i) => {
                      const isRetire = d.action === 'retired';
                      const col = isRetire ? '#ef4444' : '#a78bfa';
                      const arrow = d.direction === 'avoidance' ? '\u2193' : '\u2191';
                      const arrowCol = d.direction === 'avoidance' ? '#ef4444' : '#22c55e';
                      return (
                        <div key={i} className="mb-2 rounded-md" style={{ padding: '8px 10px', background: `${col}0a`, border: `1px solid ${col}25` }}>
                          <div className="flex items-center gap-1.5">
                            <span style={{ fontSize: 10, color: col, fontWeight: 600, textTransform: 'uppercase' }}>{isRetire ? 'RETIRED' : 'WRITTEN'}</span>
                            <span className="text-gray-300 text-xs">{d.key}</span>
                          </div>
                          {d.description && (
                            <div className="text-gray-200 text-xs mt-1">
                              <span style={{ color: arrowCol }}>{arrow}</span> {d.description}
                            </div>
                          )}
                          {d.source_principles?.length > 0 && (
                            <div className="text-gray-500 text-xs mt-1">Principles: {d.source_principles.join(', ')}</div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}

                {(!drData.execution?.s_output?.length && !drData.execution?.d_output?.length) && (
                  <div className="px-4 pb-4 text-xs text-gray-600">No samskara or desire changes in this DR</div>
                )}

                <div className="px-4 pb-4">
                  <div style={{ fontSize: 10, color: '#888', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>Execution Trace</div>
                  <div className="text-xs text-gray-500">
                    {drData.execution?.karma_count || 0} karma entries {'\u00b7'} ${drData.execution?.cost?.toFixed(4) || '0'} {'\u00b7'} {Math.round((drData.execution?.duration_ms || 0) / 1000)}s
                  </div>
                </div>
              </div>
            </div>
          ) : (
            <div className="p-8 text-gray-500 text-sm">Select a DR session</div>
          )}
        </div>
      );
    }

    // ── Mutations Tab ─────────────────────────────────────────
    function MutationsTab({ patronKey }) {
      const [staged, setStaged] = useState([]);
      const [inflight, setInflight] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [expandedId, setExpandedId] = useState(null);
      const [detail, setDetail] = useState(null);
      const [filter, setFilter] = useState('all');

      const loadMutations = useCallback(() => {
        setLoading(true); setError(null);
        Promise.all([
          api('/kv?prefix=mutation_staged:', patronKey),
          api('/kv?prefix=mutation_rollback:', patronKey),
        ]).then(([s, c]) => {
          setStaged((s.keys || []).map(k => ({ ...k, status: 'staged' })));
          setInflight((c.keys || []).map(k => ({ ...k, status: 'inflight' })));
          setLoading(false);
        }).catch(e => { setError(e.message); setLoading(false); });
      }, [patronKey]);

      useEffect(() => { loadMutations(); }, [loadMutations]);

      const all = useMemo(() => {
        return [...staged, ...inflight].sort((a, b) => {
          // Extract mutation ID for sorting
          return b.key.localeCompare(a.key);
        });
      }, [staged, inflight]);

      const filtered = filter === 'all' ? all : all.filter(m => m.status === filter);

      const loadDetail = async (key) => {
        if (expandedId === key) { setExpandedId(null); return; }
        setExpandedId(key);
        try {
          const d = await api(`/kv/${encodeURIComponent(key)}`, patronKey);
          setDetail(d.value);
        } catch { setDetail('(error)'); }
      };

      const STATUS_COLORS = {
        staged: { bar: 'bg-yellow-500', text: 'text-yellow-400', label: 'Staged' },
        inflight: { bar: 'bg-blue-500', text: 'text-blue-400', label: 'Inflight' },
        promoted: { bar: 'bg-green-500', text: 'text-green-400', label: 'Promoted' },
        rolled_back: { bar: 'bg-red-500', text: 'text-red-400', label: 'Rolled Back' },
      };

      if (loading) return <p className="text-gray-500 text-sm">Loading proposals...</p>;
      if (error) return <LoadError error={error} onRetry={loadMutations} />;

      return (
        <div className="h-full overflow-y-auto scrollbar-thin">
          <div className="flex gap-2 mb-4">
            {['all', 'staged', 'inflight'].map(f => (
              <button
                key={f}
                onClick={() => setFilter(f)}
                className={`px-3 py-1 rounded text-xs border transition ${
                  filter === f
                    ? 'border-accent text-accent bg-accent/10'
                    : 'border-border text-gray-500 hover:text-gray-300'
                }`}
              >
                {f.charAt(0).toUpperCase() + f.slice(1)}
                <span className="ml-1 text-gray-600">
                  ({f === 'all' ? all.length : f === 'staged' ? staged.length : inflight.length})
                </span>
              </button>
            ))}
          </div>

          <div className="space-y-2">
            {filtered.length === 0 && <p className="text-gray-500 text-xs">No proposals found</p>}
            {filtered.map(m => {
              const sc = STATUS_COLORS[m.status] || STATUS_COLORS.staged;
              return (
                <div key={m.key}>
                  <button
                    onClick={() => loadDetail(m.key)}
                    className={`w-full text-left px-3 py-2 rounded border transition ${
                      expandedId === m.key
                        ? 'border-accent bg-accent/5'
                        : 'border-border hover:border-gray-600 bg-bg-card'
                    }`}
                  >
                    <div className="flex items-center gap-2">
                      <div className={`w-1.5 h-6 rounded-full ${sc.bar}`}></div>
                      <span className="text-xs text-gray-300 flex-1 truncate">{m.key}</span>
                      <span className={`text-xs ${sc.text}`}>{sc.label}</span>
                    </div>
                  </button>
                  {expandedId === m.key && detail && (
                    <div className="ml-6 mt-1 mb-2 bg-bg rounded p-3 text-xs max-h-80 overflow-y-auto scrollbar-thin fade-in">
                      <JsonView data={detail} />
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Contacts Tab ────────────────────────────────────────────
    function ContactsTab({ patronKey }) {
      const [contacts, setContacts] = useState([]);
      const [bindings, setBindings] = useState([]);
      const [selectedSlug, setSelectedSlug] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const load = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const [cRes, pRes] = await Promise.all([
            api('/kv?prefix=contact:', patronKey),
            api('/kv?prefix=contact_platform:', patronKey),
          ]);
          // Load contact values
          const contactList = [];
          for (const k of (cRes.keys || [])) {
            if (k.key.startsWith('contact_platform:')) continue;
            try {
              const d = await api(`/kv/${encodeURIComponent(k.key)}`, patronKey);
              contactList.push({ slug: k.key.replace('contact:', ''), ...d.value });
            } catch {}
          }
          // Load platform bindings
          const bindingList = [];
          for (const k of (pRes.keys || [])) {
            try {
              const d = await api(`/kv/${encodeURIComponent(k.key)}`, patronKey);
              const parts = k.key.replace('contact_platform:', '').split(':');
              const platform = parts[0];
              const platformId = parts.slice(1).join(':');
              bindingList.push({ key: k.key, platform, platformId, ...d.value });
            } catch {}
          }
          setContacts(contactList);
          setBindings(bindingList);
          setLoading(false);
        } catch (e) { setError(e.message); setLoading(false); }
      }, [patronKey]);

      useEffect(() => { load(); }, [load]);

      const toggleApproval = async (binding) => {
        const newApproved = !binding.approved;
        try {
          await fetch(`${API_URL}/contact-platform/${encodeURIComponent(binding.platform)}/${encodeURIComponent(binding.platformId)}/approve`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'X-Patron-Key': patronKey },
            body: JSON.stringify({ approved: newApproved }),
          });
          await load();
        } catch {}
      };

      if (loading) return <p className="text-gray-500 text-sm p-4">Loading contacts...</p>;
      if (error) return <LoadError error={error} onRetry={load} />;

      const selected = contacts.find(c => c.slug === selectedSlug);
      const selectedBindings = bindings.filter(b => b.slug === selectedSlug);
      const pendingBindings = bindings.filter(b => !b.approved);

      return (
        <div className="flex h-full gap-0">
          {/* Left panel — contact list */}
          <div className="w-64 flex-shrink-0 border-r border-border overflow-y-auto scrollbar-thin p-3">
            {pendingBindings.length > 0 && (
              <div className="mb-3 p-2 rounded bg-yellow-900/20 border border-yellow-800/40">
                <div className="text-xs text-yellow-400 font-semibold mb-1">Pending Approvals ({pendingBindings.length})</div>
                {pendingBindings.map(b => (
                  <div key={b.key} className="flex items-center justify-between text-xs py-1">
                    <span className="text-gray-300 truncate flex-1">
                      <span className="text-gray-500">{b.platform}:</span> {b.platformId}
                    </span>
                    <button
                      onClick={() => toggleApproval(b)}
                      className="ml-2 px-2 py-0.5 rounded text-[10px] bg-green-900/30 text-green-400 border border-green-800 hover:bg-green-900/50 transition"
                    >approve</button>
                  </div>
                ))}
              </div>
            )}
            <div className="text-xs text-gray-500 mb-2 font-semibold">Contacts ({contacts.length})</div>
            {contacts.map(c => {
              const cBindings = bindings.filter(b => b.slug === c.slug);
              const pendingCount = cBindings.filter(b => !b.approved).length;
              return (
                <button
                  key={c.slug}
                  onClick={() => setSelectedSlug(c.slug)}
                  className={`w-full text-left px-2 py-1.5 rounded text-xs mb-1 transition ${
                    selectedSlug === c.slug
                      ? 'bg-accent/10 border border-accent text-accent'
                      : 'border border-transparent hover:border-gray-700 text-gray-300'
                  }`}
                >
                  <div className="flex items-center gap-1">
                    <span className="truncate flex-1 font-medium">{c.name}</span>
                    {pendingCount > 0 && (
                      <span className="px-1.5 py-0.5 rounded-full bg-yellow-900/40 text-yellow-400 text-[10px]">{pendingCount}</span>
                    )}
                  </div>
                  {c.relationship && <div className="text-gray-500 text-[10px] truncate">{c.relationship}</div>}
                  <div className="text-gray-600 text-[10px]">{cBindings.length} platform{cBindings.length !== 1 ? 's' : ''}</div>
                </button>
              );
            })}
          </div>

          {/* Right panel — contact detail */}
          <div className="flex-1 overflow-y-auto scrollbar-thin p-4">
            {!selected ? (
              <p className="text-gray-500 text-sm">Select a contact</p>
            ) : (
              <div className="fade-in">
                <h2 className="text-accent font-bold text-sm mb-1">{selected.name}</h2>
                {selected.relationship && <div className="text-gray-400 text-xs mb-2">{selected.relationship}</div>}
                {selected.about && <div className="text-gray-300 text-xs mb-3">{selected.about}</div>}
                {selected.communication && (
                  <div className="mb-3">
                    <div className="text-gray-500 text-[10px] font-semibold mb-1">Communication guidance</div>
                    <div className="text-gray-400 text-xs bg-bg rounded p-2 border border-border">{selected.communication}</div>
                  </div>
                )}
                {selected.chat && (
                  <div className="mb-3">
                    <div className="text-gray-500 text-[10px] font-semibold mb-1">Chat config</div>
                    <div className="bg-bg rounded p-2 border border-border">
                      <JsonView data={selected.chat} />
                    </div>
                  </div>
                )}

                <div className="text-gray-500 text-[10px] font-semibold mb-2 mt-4">Platform Bindings</div>
                {selectedBindings.length === 0 ? (
                  <p className="text-gray-600 text-xs">No platform bindings</p>
                ) : (
                  <div className="space-y-2">
                    {selectedBindings.map(b => (
                      <div key={b.key} className="flex items-center gap-2 px-3 py-2 rounded border border-border bg-bg-card">
                        <div className={`w-1.5 h-6 rounded-full ${b.approved ? 'bg-green-500' : 'bg-yellow-500'}`}></div>
                        <div className="flex-1 min-w-0">
                          <div className="text-xs text-gray-300">
                            <span className="text-gray-500">{b.platform}</span>
                            <span className="mx-1 text-gray-600">:</span>
                            <span className="font-medium">{b.platformId}</span>
                          </div>
                        </div>
                        <button
                          onClick={() => toggleApproval(b)}
                          className={`px-2 py-0.5 rounded text-[10px] border transition ${
                            b.approved
                              ? 'bg-red-900/20 text-red-400 border-red-800 hover:bg-red-900/40'
                              : 'bg-green-900/20 text-green-400 border-green-800 hover:bg-green-900/40'
                          }`}
                        >{b.approved ? 'revoke' : 'approve'}</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Chat Tab ──────────────────────────────────────────────
    function ChatTab({ patronKey }) {
      const [chats, setChats] = useState([]);
      const [selectedChat, setSelectedChat] = useState(null);
      const [chatData, setChatData] = useState(null);
      const [participants, setParticipants] = useState({});
      const [loading, setLoading] = useState(false);

      const refreshChats = useCallback(async () => {
        try {
          const d = await api('/chats', patronKey);
          setChats(d.chats || []);
        } catch {}
      }, [patronKey]);

      useEffect(() => {
        refreshChats();
        const iv = setInterval(refreshChats, 10000);
        return () => clearInterval(iv);
      }, [refreshChats]);

      const loadChat = useCallback(async (platform, channelId) => {
        setLoading(true);
        try {
          const d = await api(`/chat/${platform}/${channelId}`, patronKey);
          setChatData(d.chat || null);
          setParticipants(d.participants || {});
        } catch { setChatData(null); }
        setLoading(false);
      }, [patronKey]);

      useEffect(() => {
        if (selectedChat) {
          const c = chats.find(ch => ch.key === selectedChat);
          if (c) loadChat(c.platform, c.channel_id);
        }
      }, [selectedChat, chats, loadChat]);

      // Auto-refresh selected chat
      useEffect(() => {
        if (!selectedChat) return;
        const c = chats.find(ch => ch.key === selectedChat);
        if (!c) return;
        const iv = setInterval(() => loadChat(c.platform, c.channel_id), 5000);
        return () => clearInterval(iv);
      }, [selectedChat, chats, loadChat]);

      const formatTime = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      };

      const formatDate = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
      };

      const roleColors = {
        user: { bg: 'bg-blue-900/30', border: 'border-blue-700', text: 'text-blue-300', label: 'text-blue-400' },
        assistant: { bg: 'bg-green-900/30', border: 'border-green-700', text: 'text-green-300', label: 'text-green-400' },
        system: { bg: 'bg-yellow-900/20', border: 'border-yellow-800', text: 'text-yellow-300', label: 'text-yellow-500' },
        tool: { bg: 'bg-purple-900/20', border: 'border-purple-800', text: 'text-purple-300', label: 'text-purple-400' },
      };

      return (
        <div className="flex h-full gap-0">
          {/* Left: conversation list */}
          <div className="w-64 flex-shrink-0 border-r border-border overflow-y-auto scrollbar-thin">
            <div className="p-3 border-b border-border">
              <h3 className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Conversations</h3>
              <span className="text-gray-600 text-xs">{chats.length} total</span>
            </div>
            {chats.map(c => (
              <button
                key={c.key}
                onClick={() => setSelectedChat(c.key)}
                className={`w-full text-left px-3 py-2 border-b border-border/50 transition text-xs ${
                  selectedChat === c.key
                    ? 'bg-accent/10 border-l-2 border-l-accent'
                    : 'hover:bg-bg-card'
                }`}
              >
                <div className="flex items-center justify-between">
                  <span className="text-gray-300 truncate">
                    {c.participants && Object.values(c.participants).some(v => v !== Object.keys(c.participants)[0])
                      ? Object.values(c.participants).join(', ')
                      : c.channel_id}
                  </span>
                  <span className="text-gray-600">{c.platform}</span>
                </div>
                <div className="flex items-center justify-between mt-1">
                  <span className="text-gray-500">{c.turn_count} turns</span>
                  <span className="text-gray-600">{formatDate(c.last_activity)} {formatTime(c.last_activity)}</span>
                </div>
                {c.total_cost > 0 && (
                  <span className="text-gray-600">${c.total_cost.toFixed(4)}</span>
                )}
              </button>
            ))}
            {chats.length === 0 && (
              <p className="text-gray-600 text-xs p-3">No conversations yet</p>
            )}
          </div>

          {/* Right: message view */}
          <div className="flex-1 flex flex-col overflow-hidden">
            {!selectedChat && (
              <div className="flex-1 flex items-center justify-center text-gray-600 text-xs">
                Select a conversation
              </div>
            )}
            {selectedChat && loading && !chatData && (
              <div className="flex-1 flex items-center justify-center text-gray-600 text-xs">
                Loading...
              </div>
            )}
            {selectedChat && chatData && (
              <>
                {/* Chat header */}
                <div className="px-4 py-2 border-b border-border flex items-center gap-3 text-xs">
                  <span className="text-accent font-semibold">Swayambhu</span>
                  {Object.keys(participants).length > 0 && (
                    <>
                      <span className="text-gray-600">&</span>
                      <span className="text-blue-400 font-semibold">{Object.values(participants).join(', ')}</span>
                    </>
                  )}
                  <span className="text-gray-600">|</span>
                  <span className="text-gray-500">{chatData.turn_count || 0} turns</span>
                  <span className="text-gray-600">|</span>
                  <span className="text-gray-500">${(chatData.total_cost || 0).toFixed(4)}</span>
                  {chatData.source_session && (
                    <>
                      <span className="text-gray-600">|</span>
                      <span className="text-accent text-xs">from {chatData.source_session}</span>
                    </>
                  )}
                </div>

                {/* Messages */}
                <div className="flex-1 overflow-y-auto scrollbar-thin p-4 space-y-2">
                  {(chatData.messages || []).slice().reverse().map((msg, i) => {
                    const rc = roleColors[msg.role] || roleColors.system;
                    const isToolResult = msg.role === 'tool';
                    return (
                      <div key={i} className={`${rc.bg} border ${rc.border} rounded px-3 py-2 text-xs fade-in`}>
                        <div className="flex items-center gap-2 mb-1">
                          <span className={`font-semibold ${rc.label}`}>
                            {msg.role === 'assistant' ? 'Swayambhu'
                              : msg.role === 'user' ? (participants[msg.userId] || msg.userId || 'user')
                              : msg.role}
                          </span>
                          {msg.ts && <span className="text-gray-600 ml-auto">{formatTime(msg.ts)}</span>}
                          {msg.source_session && (
                            <span className="text-accent text-[10px]">via {msg.source_session}</span>
                          )}
                        </div>
                        {isToolResult ? (
                          <pre className={`${rc.text} whitespace-pre-wrap break-all`}>
                            {typeof msg.content === 'string' ? msg.content.slice(0, 500) : JSON.stringify(msg.content, null, 2).slice(0, 500)}
                          </pre>
                        ) : msg.tool_calls ? (
                          <div className="space-y-1">
                            {msg.content && <p className={rc.text}>{msg.content}</p>}
                            {msg.tool_calls.map((tc, j) => (
                              <div key={j} className="bg-purple-900/20 border border-purple-800 rounded px-2 py-1">
                                <span className="text-purple-400 font-semibold">{tc.function?.name || tc.name}</span>
                                <pre className="text-purple-300 text-[10px] mt-0.5 whitespace-pre-wrap break-all">
                                  {typeof tc.function?.arguments === 'string'
                                    ? tc.function.arguments.slice(0, 300)
                                    : JSON.stringify(tc.function?.arguments, null, 2).slice(0, 300)}
                                </pre>
                              </div>
                            ))}
                          </div>
                        ) : (
                          <p className={`${rc.text} whitespace-pre-wrap`}>{msg.content}</p>
                        )}
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ── Draggable Divider ─────────────────────────────────────
    function DraggableDivider({ onDrag }) {
      const handleMouseDown = useCallback((e) => {
        e.preventDefault();
        document.body.classList.add('divider-dragging');
        const onMove = (ev) => onDrag(ev.clientX);
        const onUp = () => {
          document.body.classList.remove('divider-dragging');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }, [onDrag]);

      return (
        <div
          onMouseDown={handleMouseDown}
          style={{ width: 4, minWidth: 4, cursor: 'col-resize', background: '#1e1e3a' }}
        ></div>
      );
    }

    // ── Direct Message Bar ─────────────────────────────────────
    function DirectMessageBar({ patronKey }) {
      const [pending, setPending] = useState(null);     // { message, sent_at } or null
      const [draft, setDraft] = useState('');
      const [editing, setEditing] = useState(false);
      const [sending, setSending] = useState(false);

      const refresh = useCallback(async () => {
        if (!patronKey) return;
        try {
          const d = await api('/direct', patronKey);
          setPending(d.pending ? d.message : null);
        } catch {}
      }, [patronKey]);

      useEffect(() => { refresh(); }, [refresh]);
      // Poll every 10s to detect when the agent consumes the message
      useEffect(() => {
        const iv = setInterval(refresh, 10000);
        return () => clearInterval(iv);
      }, [refresh]);

      const send = async () => {
        if (!draft.trim() || sending) return;
        setSending(true);
        try {
          await fetch(`${API_URL}/direct`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Patron-Key': patronKey },
            body: JSON.stringify({ message: draft.trim() }),
          });
          setDraft('');
          setEditing(false);
          await refresh();
        } catch {}
        setSending(false);
      };

      const del = async () => {
        try {
          await fetch(`${API_URL}/direct`, {
            method: 'DELETE',
            headers: { 'X-Patron-Key': patronKey },
          });
          setPending(null);
          setDraft('');
          setEditing(false);
        } catch {}
      };

      const startEdit = () => {
        setDraft(pending?.message || '');
        setEditing(true);
      };

      // Show pending message
      if (pending && !editing) {
        return (
          <div className="bg-cyan-950/30 border-b border-cyan-900/50 px-4 py-1.5 flex items-center gap-3 text-xs">
            <span className="text-cyan-600 font-semibold flex-shrink-0">DIRECT</span>
            <span className="bg-cyan-900/40 text-cyan-400 px-1.5 py-0.5 rounded text-[10px] font-semibold flex-shrink-0">PENDING</span>
            <span className="text-cyan-300/80 truncate flex-1">{pending.message}</span>
            <span className="text-gray-600 flex-shrink-0">{pending.sent_at ? new Date(pending.sent_at).toLocaleTimeString() : ''}</span>
            <button onClick={startEdit} className="text-cyan-600 hover:text-cyan-400 transition">edit</button>
            <button onClick={del} className="text-red-700 hover:text-red-400 transition">delete</button>
          </div>
        );
      }

      // Show input (compose or edit mode)
      if (editing) {
        return (
          <div className="bg-cyan-950/30 border-b border-cyan-900/50 px-4 py-1.5 flex items-center gap-2 text-xs">
            <span className="text-cyan-600 font-semibold flex-shrink-0">DIRECT</span>
            <input
              type="text"
              value={draft}
              onChange={(e) => setDraft(e.target.value)}
              onKeyDown={(e) => { if (e.key === 'Enter') send(); if (e.key === 'Escape') { setEditing(false); setDraft(''); } }}
              placeholder="Message to agent (read in next session)..."
              className="flex-1 bg-transparent border border-cyan-900/50 rounded px-2 py-1 text-cyan-200 placeholder-gray-600 focus:outline-none focus:border-cyan-700"
              autoFocus
            />
            <button
              onClick={send}
              disabled={!draft.trim() || sending}
              className="text-cyan-500 hover:text-cyan-300 disabled:text-gray-700 transition font-semibold"
            >{sending ? '...' : 'send'}</button>
            <button
              onClick={() => { setEditing(false); setDraft(''); }}
              className="text-gray-600 hover:text-gray-400 transition"
            >cancel</button>
          </div>
        );
      }

      // Collapsed — just a small trigger button
      return (
        <div className="bg-bg-panel border-b border-border px-4 py-1 flex items-center text-xs">
          <button
            onClick={() => setEditing(true)}
            className="text-gray-600 hover:text-cyan-500 transition"
          >+ direct message</button>
        </div>
      );
    }

    // ── Mind Tab ────────────────────────────────────────────

    function MindTab({ patronKey }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [selected, setSelected] = useState(null);

      const loadData = useCallback(async () => {
        try {
          const result = await api('/mind', patronKey);
          setData(result);
          setError(null);
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      }, [patronKey]);

      useEffect(() => { loadData(); }, [loadData]);

      useEffect(() => {
        if (data && !selected) {
          const first = data.principles?.[0] || data.desires?.[0] || data.samskaras?.[0] || data.experiences?.[0];
          if (first) {
            const type = first.pattern !== undefined ? 'samskara'
              : first.direction !== undefined ? 'desire'

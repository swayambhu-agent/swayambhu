name = "swayambhu-cns"
main = "index.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace binding
[[kv_namespaces]]
binding = "KV"
id = "65bd71bdbec7469ca3f78095f447008d"

# Cron trigger — every minute. The kernel checks session_schedule.next_session_after
# and skips if it's not time yet. This gives the agent fine-grained control
# over its own session frequency via interval_seconds.
[triggers]
crons = ["* * * * *"]

# Secrets (set via: wrangler secret put SECRET_NAME)
# OPENROUTER_API_KEY
# SLACK_BOT_TOKEN
# SLACK_CHANNEL_ID
# SLACK_SIGNING_SECRET
# WALLET_ADDRESS
# WALLET_PRIVATE_KEY
